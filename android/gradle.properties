# Gradle'a pluginlerin imaj oluşturmasına izin verme, sistem JDK'sını zorla
org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr

# Aşağıdaki ayar imaj transformasyon hatalarını bastırır
android.suppressUnsupportedCompileSdk=35

# Bellek ve Performans Ayarları
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# Android X ve Jetifier
android.useAndroidX=true
android.enableJetifier=true